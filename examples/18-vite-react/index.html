<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example 18 — Vite + React</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: .75rem 1rem;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }
    header h1 { font-size: 1rem; font-weight: 600; }
    #status {
      font-size: .85rem;
      opacity: .7;
      white-space: nowrap;
    }
    .actions {
      display: flex;
      gap: .5rem;
      align-items: center;
    }
    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: .5rem 1.1rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: .9rem;
    }
    button:hover { background: #7dd3fc; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .layout {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .panels--top {
      flex: 1;
    }
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .panel--output {
      flex: 0 0 30vh;
      border-top: 1px solid #1f2937;
    }
    .panel-header {
      padding: .5rem .75rem;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      opacity: .7;
    }
    .panel + .panel { border-left: 1px solid #1f2937; }
    .panel-body {
      flex: 1;
      background: #0b1220;
      padding: 1rem;
      color: #e2e8f0;
      font-size: .9rem;
      line-height: 1.6;
    }
    .panel-body--editor {
      padding: 0;
    }
    #tree {
      margin: 0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: .85rem;
      color: #94a3b8;
      white-space: pre;
    }
    .tree-container {
      height: 100%;
    }
    .tree-row {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .2rem .5rem;
      border-radius: 4px;
      cursor: pointer;
      color: #94a3b8;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: .85rem;
    }
    .tree-row.is-selected {
      background: rgba(56, 189, 248, 0.18);
      color: #e2e8f0;
    }
    .tree-row:hover {
      background: rgba(56, 189, 248, 0.12);
      color: #e2e8f0;
    }
    .tree-icon {
      width: 1rem;
      text-align: center;
    }
    .tree-label {
      white-space: nowrap;
    }
    .tree-caret {
      margin-left: auto;
      opacity: .6;
    }
    #output {
      flex: 1;
      background: #0b1220;
      color: #94a3b8;
      padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: .85rem;
      line-height: 1.5;
      overflow: auto;
      white-space: pre-wrap;
    }
    .muted { color: #94a3b8; }
    .list { margin-top: .75rem; padding-left: 1rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
