<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vitamin Bun — Hello World</title>
  <!-- COOP/COEP headers are required for SharedArrayBuffer support.
       In production, configure your server to send these headers.
       For local dev, Vite plugin or a custom server can inject them. -->
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 2rem; }
    h1 { margin-top: 0; }
    button { padding: 0.6rem 1.2rem; font-size: 1rem; border-radius: 999px; border: none; background: #38bdf8; color: #0f172a; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    pre  { background: #0b1220; padding: 1rem; border-radius: 12px; white-space: pre-wrap; }
    #output { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>🧪 Hello World — Vitamin Bun</h1>
  <p>Run a simple TypeScript file inside a browser-based Bun container.</p>
  <button id="run">▶ Run</button>
  <pre id="output">Click "Run" to start…</pre>

  <script type="module" src="./main.ts"></script>
</body>
</html>
